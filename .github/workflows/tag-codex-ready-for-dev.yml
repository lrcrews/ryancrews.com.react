name: Run Codex when issue is ready for dev

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: codex-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  run-codex:
    if: >
      github.event.label.name == 'Ready for dev' &&
      !contains(github.event.issue.labels.*.name, 'codex-tagged')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          output-file: codex-output.md
          prompt: |
            You are working in the ryancrews.com React repository.

            Issue:
            - Number: #${{ github.event.issue.number }}
            - Title: ${{ github.event.issue.title }}
            - URL: ${{ github.event.issue.html_url }}

            Issue body:
            ${{ github.event.issue.body }}

            Task:
            Implement the requested change from this issue.

            Repository rules:
            - Use npm for package management.
            - Do not switch package managers or introduce a new lockfile.
            - Do not run npm run deploy.
            - Do not run npm run eject.
            - Do not commit generated build/ output.
            - Keep the change small, focused, and reviewable.
            - Follow AGENTS.md and any nested AGENTS.md files.
            - Run npm test -- --watchAll=false and npm run build if feasible.

            Expected result:
            - Modify the code as needed.
            - Leave a clean working tree except for the intended changes.
            - Summarize changes and verification in your final response.

      - name: Remove Codex output artifact from pull request diff
        run: rm -f codex-output.md

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        id: create_pr
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: codex/issue-${{ github.event.issue.number }}
          title: "Codex: ${{ github.event.issue.title }}"
          body: |
            Implements #${{ github.event.issue.number }}.

            This PR was generated by Codex from the `Ready for dev` issue workflow.

            Issue: ${{ github.event.issue.html_url }}
          commit-message: "Implement issue #${{ github.event.issue.number }} with Codex"
          delete-branch: true

      - name: Mark issue as tagged
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        env:
          PULL_REQUEST_URL: ${{ steps.create_pr.outputs.pull-request-url }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const pullRequestUrl = process.env.PULL_REQUEST_URL;

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: ["codex-tagged"]
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: `Codex opened a pull request for this issue: ${pullRequestUrl}`
            });

      - name: Comment when Codex makes no changes
        if: steps.changes.outputs.has_changes == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: "Codex ran for this issue but did not produce any repository changes. A human should review the issue and workflow logs."
            });
